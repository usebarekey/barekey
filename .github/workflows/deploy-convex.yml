name: Deploy Convex

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-convex-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Convex functions
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate runtime config artifacts
        env:
          AUTUMN_SECRET_KEY: ${{ secrets.CONVEX_AUTUMN_SECRET_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CONVEX_CLERK_SECRET_KEY }}
        run: |
          mkdir -p pkg/convex/generated

          cat <<EOF > pkg/convex/generated/private_config.generated.ts
          /* eslint-disable */
          /* This file is generated by Barekey bootstrap sync. */

          export const convexPrivateConfig = {
            "autumnSecretKey": "${AUTUMN_SECRET_KEY}",
            "barekeyUiOrigin": "https://auth.barekey.dev",
            "clerkIssuerDomain": "https://live-bear-48.clerk.accounts.dev",
            "clerkSecretKey": "${CLERK_SECRET_KEY}"
          } as const;
          EOF

      - name: Deploy to production
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: bun run convex:deploy
