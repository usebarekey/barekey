name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy ${{ matrix.worker.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker:
          - name: barekey-ui
            command: cd pkg/ui && bun run cf:deploy
          - name: barekey-auth
            command: cd pkg/auth && bun run cf:deploy
          - name: barekey-api-proxy
            command: cd pkg/api-proxy && bunx wrangler deploy

    defaults:
      run:
        working-directory: /home/runner/work/barekey/barekey

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ${{ matrix.worker.command }}
