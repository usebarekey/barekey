name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy ${{ matrix.worker.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker:
          - name: barekey-ui
            command: cd pkg/ui && bun run cf:deploy
          - name: barekey-auth
            command: cd pkg/auth && bun run cf:deploy
          - name: barekey-api-proxy
            command: cd pkg/api-proxy && bunx wrangler deploy

    defaults:
      run:
        working-directory: /home/runner/work/barekey/barekey

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate runtime config artifacts
        run: |
          mkdir -p pkg/ui/src/generated pkg/auth/src/generated pkg/api-proxy/src/generated

          cat <<'EOF' > pkg/ui/src/generated/runtime-config.generated.ts
          /* eslint-disable */
          /* This file is generated by @barekey/sdk config sync. */

          export const uiRuntimeConfig = {
            "barekeyApiUrl": "https://api.barekey.dev",
            "clerkPublishableKey": "pk_test_bGl2ZS1iZWFyLTQ4LmNsZXJrLmFjY291bnRzLmRldiQ",
            "clerkSignInFallbackRedirectUrl": "/",
            "clerkSignInUrl": "/auth/sso",
            "clerkSignUpFallbackRedirectUrl": "/",
            "convexUrl": "https://kindred-newt-974.convex.cloud",
            "posthogHost": "https://a.barekey.dev",
            "posthogKey": "phc_L17CTxD0ggxtoHDDYizcltp0fE0yBRzz11mfXM0LyHn",
            "posthogUiHost": "https://us.posthog.com"
          } as const;
          EOF

          cat <<'EOF' > pkg/auth/src/generated/runtime-config.generated.ts
          /* eslint-disable */
          /* This file is generated by @barekey/sdk config sync. */

          export const authRuntimeConfig = {
            "barekeyApiUrl": "https://api.barekey.dev",
            "clerkPublishableKey": "pk_test_bGl2ZS1iZWFyLTQ4LmNsZXJrLmFjY291bnRzLmRldiQ",
            "clerkSignInFallbackRedirectUrl": "/",
            "clerkSignInUrl": "/auth/sso",
            "clerkSignUpFallbackRedirectUrl": "/"
          } as const;
          EOF

          cat <<'EOF' > pkg/api-proxy/src/generated/private-config.generated.ts
          /* eslint-disable */
          /* This file is generated by Barekey bootstrap sync. */

          export const apiProxyRuntimeConfig = {
            "convexHttpOrigin": "https://kindred-newt-974.convex.site"
          } as const;
          EOF

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ${{ matrix.worker.command }}
